name: Diesel Live AT+DE

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install --upgrade pip
          pip install requests
      - run: python scripts/geocode_nominatim.py
      - env:
          TANKKOENIG_API_KEY: ${{ secrets.TANKKOENIG_API_KEY }}
        run: |
          python scripts/refresh_at_econtrol.py
          python scripts/refresh_de_tankkoenig.py
      - run: |
          git config user.name "price-bot"
          git config user.email "price-bot@users.noreply.github.com"
          git add stations.geo.json prices.json
          git commit -m "chore: refresh diesel AT+DE" || echo "No changes"
          git push
